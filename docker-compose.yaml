services:
  nodejs-server:
    image: supdev20/simple-server
    deploy:
      replicas: 5
    networks:
      - test-server
  caddy:
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - test-server

networks:
  test-server:
    driver: bridge
